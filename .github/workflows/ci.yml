name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ═══════════════════════════════════════════════════════════════
      # DETERMINISM AUDIT - Enforces AXIOM 3 (Determinism)
      # ═══════════════════════════════════════════════════════════════
      - name: Determinism audit
        run: npm run audit:determinism

      # ═══════════════════════════════════════════════════════════════
      # SCHEMA VERIFICATION - Enforces schema-before-behavior (P4.1)
      # ═══════════════════════════════════════════════════════════════
      - name: Schema verification
        run: npm run verify:schemas
        continue-on-error: true  # Advisory for now, will become blocking

      # ═══════════════════════════════════════════════════════════════
      # TYPE CHECK - Ensures TypeScript compiles
      # ═══════════════════════════════════════════════════════════════
      - name: TypeScript type-check
        run: npx tsc --noEmit

      # ═══════════════════════════════════════════════════════════════
      # BUILD - Compile TypeScript to JavaScript
      # ═══════════════════════════════════════════════════════════════
      - name: Build
        run: npx tsc

      # ═══════════════════════════════════════════════════════════════
      # TEST SUITE WITH COVERAGE - Run all tests with coverage (P4.2)
      # ═══════════════════════════════════════════════════════════════
      - name: Run tests with coverage
        run: npm run test:coverage

      # ═══════════════════════════════════════════════════════════════
      # COVERAGE THRESHOLD CHECK - Enforce minimum coverage (P4.2)
      # ═══════════════════════════════════════════════════════════════
      - name: Check coverage thresholds
        run: npm run coverage:check
        continue-on-error: true  # Advisory until baseline established

      # ═══════════════════════════════════════════════════════════════
      # HARDENING TESTS - Verify security gates
      # ═══════════════════════════════════════════════════════════════
      - name: Hardening tests
        run: npx tsx tests/hardening.test.ts

      # ═══════════════════════════════════════════════════════════════
      # EVIDENCE REPLAY VALIDATION - Verify all evidence (P4.3)
      # ═══════════════════════════════════════════════════════════════
      - name: Evidence replay validation
        run: npm run verify:evidence

      # ═══════════════════════════════════════════════════════════════
      # UPLOAD BUILD ARTIFACTS
      # ═══════════════════════════════════════════════════════════════
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: matrix.node-version == '20.x'
        with:
          name: build-dist
          path: dist/
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.node-version == '20.x'
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Upload evidence
        uses: actions/upload-artifact@v4
        if: matrix.node-version == '20.x' && always()
        with:
          name: evidence-${{ github.sha }}
          path: evidence/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════
  # SECURITY SCAN - Check for vulnerabilities in dependencies
  # ═══════════════════════════════════════════════════════════════════
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true  # Don't fail on audit warnings

      - name: Check for known vulnerabilities
        run: |
          echo "Checking for high/critical vulnerabilities..."
          npm audit --json | node -e "
            const data = require('fs').readFileSync(0, 'utf8');
            const audit = JSON.parse(data);
            const high = audit.metadata?.vulnerabilities?.high || 0;
            const critical = audit.metadata?.vulnerabilities?.critical || 0;
            console.log('High:', high, 'Critical:', critical);
            if (critical > 0) {
              console.error('CRITICAL vulnerabilities found!');
              process.exit(1);
            }
          " || true
